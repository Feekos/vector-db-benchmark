benchmark:
  datasets:
    - name: ru_rag_test
      path: data/raw/ru_rag_test_dataset.pkl
      question_column: "Вопрос"
      context_column: "Контекст"
      answer_column: "Правильный ответ"
      file_column: "Название файла"
  
  embedding:
    model: "intfloat/multilingual-e5-large-instruct"
    dim: 1024
    normalize: true
    batch_size: 32
    device: "cuda"
    huggingface_token: ${HF_TOKEN}  
  search:
    top_k: 10
    metrics: ["recall@1", "recall@5", "recall@10", "MRR", "latency"]
    warmup_queries: 10 
  
  databases:
    pgvectorscale:
      enabled: true
      host: "localhost"
      port: 5432
      database: "rag_benchmark"
      user: "postgres"
      password: "benchmark_pass"
      table_name: "wiki_chunks"
      index:
        type: "hnsw"
        params:
          m: 16
          ef_construction: 200
          ef_search: 200
    
    milvus:
      enabled: true
      host: "localhost"
      port: 19530
      collection_name: "ru_rag_test"
      index:
        type: "HNSW"
        metric_type: "COSINE"
        params:
          M: 16
          efConstruction: 200
          ef: 200
    
    qdrant:
      enabled: true
      host: "localhost"
      port: 6333
      grpc: true
      collection_name: "ru_rag_test"
      index:
        type: "HNSW"
        params:
          m: 16
          ef_construct: 200
          ef_search: 200
        quantization: "none"
        on_disk: false

  output:
    results_dir: "data/results"
    save_raw: true
    report_format: ["csv", "markdown", "json"]