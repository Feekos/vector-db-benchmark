services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: pgvectorscale_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: benchmark_pass
      POSTGRES_DB: rag_benchmark
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./scripts/init_pgvectorscale.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_benchmark"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
    restart: unless-stopped

  milvus:
    image: milvusdb/milvus:v2.3.2
    container_name: milvus_test
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
      TZ: UTC
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.7.3
    container_name: qdrant_test
    environment:
      TZ: UTC
      QDRANT__SERVICE__ENABLE_STATIC_CONTENT: "0"
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # test: ["CMD-SHELL", "wget --spider -q http://localhost:6333/healthz || exit 1"]
      # interval: 10s
      # timeout: 5s
      # retries: 10
      # start_period: 20s
      disable: true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
    restart: unless-stopped

volumes:
  pg_data:
  milvus_data:
  qdrant_data: